<style>
*{box-sizing:border-box;margin:0;padding:0;}

.itab.active{background:#1b3a5e;color:#fff;border-color:#1b3a5e;}

.pet-hrow{display:flex;gap:0;}

.pet-sec{text-align:center;font-size:16px;font-weight:700;letter-spacing:8px;margin:3em 0 1em;}

  body{background:#fff;}
  .app-header,.mode-bar,.inst-tabs,.inp,.doc-toolbar{display:none!important;}
  .layout{display:block;}

  .doc-screen-area{display:none!important;}
  .print-all-docs{display:block!important;}
  .print-doc-wrap .doc-wrap{box-shadow:none;width:100%;padding:12mm 18mm;min-height:auto;page-break-after:always;}
  body[data-print="calc"] .petition-print-area{display:none!important;}
  body[data-print="petition"] .calc-print-area{display:none!important;}

  body[data-print="abandon"] .calc-print-area{display:none!important;}
  body[data-print="abandon"] .petition-print-area{display:none!important;}
  @page{size:A4 portrait;margin:0;}
  .ctbl th,.wctbl th{background:#4a6fa5!important;color:#fff!important;print-color-adjust:exact;-webkit-print-color-adjust:exact;}

}

  .layout{flex-direction:column;}
  .inp{width:100%;min-width:0;}

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

/* ── 상수 ── */
const MEAL = 25000;
const ATTENDANCE = 50000;
const SEC_RATE = 250;

/* 수정 7: 변호사보수 요율표 */
const ATTORNEY_FEE_TIERS = [
  { max: 20000000,  base: 0,        exBase: 0,         rate: 0.10 },
  { max: 50000000,  base: 2000000,  exBase: 20000000,  rate: 0.08 },
  { max: 100000000, base: 4400000,  exBase: 50000000,  rate: 0.06 },
  { max: 150000000, base: 7400000,  exBase: 100000000, rate: 0.04 },
  { max: 200000000, base: 9400000,  exBase: 150000000, rate: 0.02 },
  { max: 500000000, base: 10400000, exBase: 200000000, rate: 0.01 },
  { max: Infinity,  base: 13400000, exBase: 500000000, rate: 0.005 },
];
// 출처: 변호사보수의 소송비용 산입에 관한 규칙 제3조

const QUICK_ROUTES = [
  {label:'수원역↔수원지법',     dep:'수원역', dest:'수원지방법원',    fare:1400},
  {label:'수원역↔서울행정법원', dep:'수원역', dest:'서울행정법원',    fare:9500},
  {label:'수원역↔서울중앙지법', dep:'수원역', dest:'서울중앙지방법원',fare:9500},
];

/* 수정 9: 5심까지 확장 */
const INSTANCE_LABELS = ['1심','2심','3심','4심(파기환송심)','5심'];
const SUB_LABELS = ['A','B','C','D','E'];

/* ── 헬퍼 ── */
const N   = s => parseInt((s+'').replace(/[^0-9]/g,'')) || 0;
const fmt = n => { if(!n && n!==0) return '-'; const r=Math.round(n); return r===0?'-':r.toLocaleString('ko-KR')+'원'; };
const feeCalc = soga => {
  if(!soga||soga<=0) return 0;
  for(const t of ATTORNEY_FEE_TIERS) if(soga<=t.max) return t.base+(soga-t.exBase)*t.rate;
  return 0;
};
const naverUrl = dest => `https://map.naver.com/p/search/${encodeURIComponent(dest||'법원')}`;
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}.`; };
const getAmt = (ov, auto) => ov !== '' ? N(ov) : auto;
const getTxt = (ov, auto) => ov !== '' ? ov : auto;

/* ── 자동값 ── */
const autoAttendAmt  = inst => N(inst.attendCnt) * ATTENDANCE;
const autoMealAmt    = inst => N(inst.mealCnt) * MEAL;
const autoTravelAmt  = t    => N(t.fare) * 2 * (parseInt(t.trips)||1);
const autoAttyApplied = inst => {
  const calc = feeCalc(N(inst.attySoga));
  const actual = N(inst.attyActual);
  return actual > 0 ? Math.min(calc, actual) : calc;
};
const autoSecAmt = inst => N(inst.sec.total_pages) * SEC_RATE;

/* ── 항목 목록 생성 (정규화된 inst 받음) ── */
const getInstItems = inst => {
  const items = [];
  if(inst.attendEnabled) {
    const autoAmt = autoAttendAmt(inst);
    const amt = getAmt(inst.attendAmt, autoAmt);
    items.push({ key:'attend', amount:amt,
      note: getTxt(inst.attendNote, `1회당¹⁾\n50,000원`),
      desc: `변론기일 ${N(inst.attendCnt)}회 참석 일당\n(50,000원 × ${N(inst.attendCnt)}회 = ${amt.toLocaleString()}원)`,
    });
  }
  if(inst.mealEnabled) {
    const autoAmt = autoMealAmt(inst);
    const amt = getAmt(inst.mealAmt, autoAmt);
    items.push({ key:'meal', amount:amt,
      note: getTxt(inst.mealNote, `1일²⁾\n25,000원³⁾`),
      desc: `식대\n(25,000원 × ${N(inst.mealCnt)}회 = ${amt.toLocaleString()}원)`,
    });
  }
  (inst.travels||[]).forEach((t,ti) => {
    if(t.enabled !== false) {
      const autoAmt = autoTravelAmt(t);
      const amt = getAmt(t.amt, autoAmt);
      items.push({ key:`t${ti}`, amount:amt,
        note: getTxt(t.note, `1회당⁴⁾ (편도)\n편도 ${N(t.fare).toLocaleString()}원`),
        desc: `왕복 여비(${t.dep||'　'} – ${t.dest||'　'})\n(${N(t.fare).toLocaleString()}원 × ${t.trips||1}회 × 2 = ${amt.toLocaleString()}원)`,
      });
    }
  });
  if(inst.attyEnabled) {
    const autoAmt = autoAttyApplied(inst);
    const amt = getAmt(inst.attyAmt, autoAmt);
    items.push({ key:'atty', amount:amt,
      note: getTxt(inst.attyNote, `변호사\n보수⁷⁾`),
      desc: `변호사 보수\n(적용 보수액 = ${amt.toLocaleString()}원)`,
    });
  }
  if(inst.secEnabled) {
    const autoAmt = autoSecAmt(inst);
    const amt = getAmt(inst.secAmt, autoAmt);
    items.push({ key:'sec', amount:amt,
      note: getTxt(inst.secNote, `장당\n250원`),
      desc: `서기료${inst.sec_desc?`(${inst.sec_desc})`:''}\n(총 ${N(inst.sec.total_pages)}장 × 250원 = ${amt.toLocaleString()}원)`,
    });
  }
  /* 본안 소송비용: 서기료 다음 */
  if(inst.bonStampEnabled) {
    const stamp  = N(inst.bonStamp);
    const post   = N(inst.bonPost);
    const refund = N(inst.bonRefund);
    if(stamp  > 0) items.push({ key:'bonStamp',  amount: stamp,
      note:'인지액', desc:`인지액\n(${stamp.toLocaleString()}원)` });
    if(post   > 0) items.push({ key:'bonPost',   amount: post,
      note:'송달료', desc:`송달료\n(${post.toLocaleString()}원)` });
    if(refund > 0) items.push({ key:'bonRefund', amount: -refund,
      note:'환급액', desc:`환급액\n(-${refund.toLocaleString()}원)` });
  }
  /* 기타비용: 본안소송비용 다음 */
  const otherAmt = inst.otherEnabled ? N(inst.otherAmt||inst.other) : N(inst.other);
  if((inst.otherEnabled || (!('otherEnabled' in inst))) && otherAmt > 0) {
    items.push({ key:'other', amount: otherAmt,
      note: inst.otherNote || '',
      desc: '기타비용',
    });
  }
  return items;
};

/* ── 승소 인스턴스 ── */
const defaultWinInst = label => ({
  label, num:'', court:'',
  attendEnabled:true,  attendCnt:'',  attendAmt:'',  attendNote:'',
  mealEnabled:true,    mealCnt:'',    mealAmt:'',    mealNote:'',
  travels:[],
  attyEnabled:false, attySoga:'', attyActual:'', attyAmt:'', attyNote:'',
  secEnabled:true, sec:{total_pages:''}, sec_desc:'', secAmt:'', secNote:'',
  otherEnabled:false, other:'',
  bonStampEnabled:false, bonStamp:'', bonPost:'', bonRefund:'',
  confEnabled:true,
});
const computeWinInst = inst => {
  const items = getInstItems(inst);
  const otherN = N(inst.other);
  const subtotal = items.reduce((s,i)=>s+i.amount,0) + otherN;
  const byKey = {};
  items.forEach(i => { const k=i.key.startsWith('t')?'travel':i.key; byKey[k]=(byKey[k]||0)+i.amount; });
  return { attendTotal:byKey.attend||0, mealTotal:byKey.meal||0,
           travelTotal:byKey.travel||0, attyTotal:byKey.atty||0,
           secTotal:byKey.sec||0, otherN, subtotal, grand:subtotal,
           stampN:0, postN:0, appliedFee:byKey.atty||0 };
};

/* ── 일부승소 인스턴스 ── */
const mkParty = () => ({
  attendEnabled:true,  attendCnt:'', attendAmt:'', attendNote:'',
  mealEnabled:true,    mealCnt:'',   mealAmt:'',   mealNote:'',
  travels:[],
  attyEnabled:false, attySoga:'', attyActual:'', attyAmt:'', attyNote:'',
  secEnabled:true, sec:{total_pages:''}, sec_desc:'', secAmt:'', secNote:'',
  otherEnabled:false, otherAmt:'', otherNote:'',
  confEnabled:false, confStamp:'', confPost:'',
  bonStampEnabled:false, bonStamp:'', bonPost:'', bonRefund:'',
});
const defaultPartialInst = label => ({
  label, num:'', court:'',
  p: mkParty(),  // 신청인
  d: mkParty(),  // 피신청인
});
/* 정규화: partial inst의 party 데이터를 getInstItems가 받을 수 있는 형태로 변환 */
const toWinView = (pi, party) => ({
  label:pi.label, num:pi.num, court:pi.court,

/* ── 수정 8: 각주 (6) 삭제, 7) 조건부) ── */
const WinFootnotes = ({anyAttyEnabled, isPartial, attyData}) => {
  let attyFnText = '변호사보수의 소송비용 산입에 관한 규칙 제3조';
  if(anyAttyEnabled && attyData) {
    const soga = N(attyData.soga);
    const limit = soga > 0 ? feeCalc(soga) : 0;
    const actual = N(attyData.actual);
    const applied = soga > 0 ? Math.min(limit, actual) : 0;
    if(soga > 0) {
      attyFnText = `변호사보수의 소송비용 산입에 관한 규칙 제3조 — 소가 ${fmt(soga)} 기준 규칙상 한도액 ${fmt(limit)}, 실지급액 ${fmt(actual)}, 적용 보수액 ${fmt(applied)}`;
    }
  }
  return (
    <div className="fn">
      <p contentEditable suppressContentEditableWarning><sup>1)</sup> 민사소송비용규칙 제3조</p>
      <p contentEditable suppressContentEditableWarning><sup>2)</sup> 민사소송비용규칙 제3조의 2</p>
      <p contentEditable suppressContentEditableWarning><sup>3)</sup> 법원공무원여비규칙 별표2</p>
      <p contentEditable suppressContentEditableWarning><sup>4)</sup> 민사소송비용규칙 제3조의 2</p>
      <p contentEditable suppressContentEditableWarning><sup>5)</sup> 소송비용액확정신청에 소요된 비용 중 재판비용에 해당하는 비용(신청서첨부인지대, 송달료)은 신청이 없는 경우에도 직권으로 소송비용에 산입하며(소송비용실무 152면), 총 신청비용을 초과하는 경우에도 이를 인정(서울고등법원 2012. 6. 12. 자 2012라75 결정)할 수 있으므로, 주소보정 등으로 추가적인 송달료가 발생될 경우 신청인이 별도의 신청취지 변경을 하지 아니하더라도 추가적인 송달료를 직권으로 산입 후 인정하여 주시기 바랍니다.</p>
      {anyAttyEnabled && <p contentEditable suppressContentEditableWarning><sup>7)</sup> {attyFnText}</p>}
      {isPartial && <p contentEditable suppressContentEditableWarning>⑧ 일부승소의 경우 소송비용의 부담 비율에 따라 상대방이 부담할 금액에서 자신이 상대방의 소송비용 중 부담할 금액을 공제한 나머지를 상환받는다(「민사소송법」 제101조).</p>}
    </div>
  );
};

/* ── 수정 8: MultiInstTable (WinDoc·PartialDoc 공통 테이블 렌더러) ── */
const MultiInstTable = ({insts, getItemsFn, confStamp, confPost, showConf, firstTable}) => {
  const allItems = insts.map(getItemsFn);
  const subtotals = allItems.map(items => items.reduce((s,i)=>s+i.amount,0));
  const bonAnTotal = subtotals.reduce((s,v)=>s+v,0);
  const confTotal  = showConf ? N(confStamp)+N(confPost) : 0;
  const grandTotal = bonAnTotal + confTotal;
  const n = insts.length;
  const bonAnLabel = SUB_LABELS.slice(0,n).join('+');
  const confLabel  = String.fromCharCode(65+n);
  const totalLabel = bonAnLabel + (showConf ? '+'+confLabel : '');
  return (
    <table className="wctbl" style={firstTable?{}:{marginTop:'1.5em'}}>
      <colgroup><col style={{width:'20%'}}/><col style={{width:'18%'}}/><col style={{width:'42%'}}/><col style={{width:'20%'}}/></colgroup>
      <thead><tr><th>사건번호</th><th>비용액</th><th>비용종목</th><th>비고</th></tr></thead>
      <tbody>
        {insts.map((inst,instIdx)=>{
          const items = allItems[instIdx];
          const rowspan = Math.max(1,items.length);
          return (
            <React.Fragment key={instIdx}>
              {items.length===0 && (
                <tr>
                  <td className="ctr" style={{fontWeight:700,fontSize:12,lineHeight:1.6,verticalAlign:'middle'}}>
                    {inst.num||'　'}<br/>
                    {inst.court&&<span style={{fontSize:10,color:'#666',fontWeight:400,display:'block'}}>{inst.court}</span>}
                    <span style={{fontSize:11,color:'#4a6fa5',display:'block',marginTop:2}}>[{inst.label}]</span>
                  </td>
                  <td colSpan="3" style={{textAlign:'center',color:'#aaa',fontSize:11}}>항목 없음</td>
                </tr>
              )}
              {items.map((item,itemIdx)=>(
                <tr key={item.key}>
                  {itemIdx===0&&(
                    <td rowSpan={rowspan} contentEditable suppressContentEditableWarning className="ctr" style={{fontWeight:700,fontSize:12,lineHeight:1.6,verticalAlign:'middle'}}>
                      {inst.num||'　'}<br/>
                      {inst.court&&<span style={{fontSize:10,color:'#666',fontWeight:400,display:'block'}}>{inst.court}</span>}
                      <span style={{fontSize:11,color:'#4a6fa5',display:'block',marginTop:2}}>[{inst.label}]</span>
                    </td>
                  )}
                  <td contentEditable suppressContentEditableWarning className="amt">{fmt(item.amount)}</td>
                  <td contentEditable suppressContentEditableWarning style={{whiteSpace:'pre-line',fontSize:11,lineHeight:1.6}}>{item.desc}</td>
                  <td contentEditable suppressContentEditableWarning
                      style={{whiteSpace:'pre-line',fontSize:10,textAlign:'center',lineHeight:1.5}}>
                    {item.note}
                  </td>
                </tr>
              ))}
              <tr className="wsub">
                <td contentEditable suppressContentEditableWarning className="rgt">소계 ({SUB_LABELS[instIdx]})</td>
                <td contentEditable suppressContentEditableWarning className="amt">{fmt(subtotals[instIdx])}</td>
                <td colSpan="2"></td>
              </tr>
            </React.Fragment>
          );
        })}
        <tr className="wsub">
          <td contentEditable suppressContentEditableWarning className="rgt">본안사건 소계 ({bonAnLabel})</td>
          <td contentEditable suppressContentEditableWarning className="amt">{fmt(bonAnTotal)}</td>
          <td colSpan="2"></td>
        </tr>
        {showConf && (
          <>
            <tr>
              <td contentEditable suppressContentEditableWarning rowSpan="2" className="ctr" style={{fontWeight:700,fontSize:12,lineHeight:1.7,verticalAlign:'middle'}}>소송비용확정<br/>신청비용</td>
              <td contentEditable suppressContentEditableWarning className="amt">{fmt(N(confStamp))}</td>
              <td contentEditable suppressContentEditableWarning style={{fontSize:11}}>소송비용액확정신청 인지대</td>
              <td contentEditable suppressContentEditableWarning></td>
            </tr>
            <tr>
              <td contentEditable suppressContentEditableWarning className="amt">{fmt(N(confPost))}</td>
              <td contentEditable suppressContentEditableWarning style={{fontSize:11}}>소송비용액확정신청 송달료<sup>5)</sup></td>
              <td contentEditable suppressContentEditableWarning></td>
            </tr>
            <tr className="wsub">
              <td contentEditable suppressContentEditableWarning className="rgt">신청비용 소계 ({confLabel})</td>
              <td contentEditable suppressContentEditableWarning className="amt">{fmt(confTotal)}</td>
              <td colSpan="2"></td>
            </tr>
          </>
        )}
        {/* 수정 8③: 총합계 행 2·3번 셀 colspan=2 병합 */}
        <tr className="wttl">
          <td contentEditable suppressContentEditableWarning className="rgt">총합계 ({totalLabel})</td>
          <td contentEditable suppressContentEditableWarning colSpan="2" style={{textAlign:'center'}}>{fmt(grandTotal)}</td>
          <td contentEditable suppressContentEditableWarning></td>
        </tr>

};

/* ── WinDoc (수정 1·3·4·8) ── */
const WinDoc = ({winInsts, confStamp, confPost}) => {
  const anyAttyEnabled = winInsts.some(i=>i.attyEnabled);
  const firstAtty = winInsts.find(i=>i.attyEnabled);
  const attyData = firstAtty ? {soga: firstAtty.attySoga, actual: firstAtty.attyActual} : null;
  const showConf = winInsts.some(i=>i.confEnabled);
  return (
    <div>
      <div className="doc-title" contentEditable suppressContentEditableWarning>소 송 비 용 계 산 서</div>
      <MultiInstTable insts={winInsts} getItemsFn={inst=>getInstItems(inst)}
        confStamp={confStamp} confPost={confPost} showConf={showConf} firstTable={true}/>
      <WinFootnotes anyAttyEnabled={anyAttyEnabled} isPartial={false} attyData={attyData}/>
    </div>
  );
};

/* ── 수정 11: PartialDoc (WinDoc 구조로 완전 교체) ── */
const PartialDoc = ({partialInsts, pRatioNum, pRatioDen, calcMode='both', bonStamp='', bonPost=''}) => {
  const rNum = parseInt(pRatioNum)||0;
  const rDen = parseInt(pRatioDen)||10;
  const showP = calcMode==='both' || calcMode==='p';
  const showD = calcMode==='both' || calcMode==='d';
  const pTotalAll = partialInsts.reduce((s,pi)=>{
    const items = getInstItems(toWinView(pi,'p'));
    return s + items.reduce((ss,i)=>ss+i.amount,0);
  },0);
  const dTotalAll = partialInsts.reduce((s,pi)=>{
    const items = getInstItems(toWinView(pi,'d'));
    return s + items.reduce((ss,i)=>ss+i.amount,0);
  },0);
  const bonTotal = N(bonStamp)+N(bonPost);
  const reimbursement = (rNum/rDen)*pTotalAll - ((rDen-rNum)/rDen)*dTotalAll;
  const anyAttyEnabled = partialInsts.some(pi=>pi.p.attyEnabled||pi.d.attyEnabled);
  return (
    <div>
      <div className="doc-title" contentEditable suppressContentEditableWarning>소 송 비 용 계 산 서</div>
      {/* 본안 소송비용 표시 */}
      {bonTotal > 0 && (
        <div style={{margin:'8px 0',padding:'8px 12px',background:'#f5f7fa',border:'1px solid #ccd3db',borderRadius:5,fontSize:12}}>
          <strong>본안 소송비용</strong>
          <span style={{marginLeft:16}}>인지액: {fmt(N(bonStamp))}</span>
          <span style={{marginLeft:16}}>송달료: {fmt(N(bonPost))}</span>
          <span style={{marginLeft:16,fontWeight:700}}>소계: {fmt(bonTotal)}</span>
        </div>
      )}
      {showP && (
        <>
          <div className="doc-sec-label" style={{marginTop:'4.5em'}}>신청인 소송비용</div>
          <MultiInstTable insts={partialInsts} getItemsFn={pi=>getInstItems(toWinView(pi,'p'))}
            showConf={partialInsts.some(pi=>pi.p.confEnabled)}
            confStamp={partialInsts.reduce((s,pi)=>s+N(pi.p.confStamp),0).toString()}
            confPost={partialInsts.reduce((s,pi)=>s+N(pi.p.confPost),0).toString()}
            firstTable={false}/>
        </>
      )}
      {showD && (
        <>
          <div className="doc-sec-label" style={{marginTop:'1.5em'}}>피신청인 소송비용</div>
          <MultiInstTable insts={partialInsts} getItemsFn={pi=>getInstItems(toWinView(pi,'d'))}
            showConf={partialInsts.some(pi=>pi.d.confEnabled)}
            confStamp={partialInsts.reduce((s,pi)=>s+N(pi.d.confStamp),0).toString()}
            confPost={partialInsts.reduce((s,pi)=>s+N(pi.d.confPost),0).toString()}
            firstTable={false}/>
        </>
      )}
      {calcMode==='both' && (
        <>
          <div style={{margin:'14px 0',padding:'12px',background:'#f5f7fa',border:'1px solid #ccd3db',borderRadius:5,fontSize:13}}>
            <strong>소송비용 부담 비율</strong>
            <div style={{marginTop:6}}>
              신청인 부담: {rDen-rNum}/{rDen} ({(((rDen-rNum)/rDen)*100).toFixed(1)}%)&nbsp;&nbsp;&nbsp;
              피신청인 부담: {rNum}/{rDen} ({((rNum/rDen)*100).toFixed(1)}%)
            </div>
          </div>
          <div className="reimb">
            <div className="reimb-title">피신청인이 신청인에게 상환하여야 할 금액⑧</div>
            <div className="reimb-formula">= 피신청인 부담비율 × 신청인 소송비용 &minus; 신청인 부담비율 × 피신청인 소송비용</div>
            <div className="reimb-formula">= {rNum}/{rDen} × {fmt(pTotalAll)} &minus; {rDen-rNum}/{rDen} × {fmt(dTotalAll)}</div>
            <div className="reimb-formula">= {fmt((rNum/rDen)*pTotalAll)} &minus; {fmt(((rDen-rNum)/rDen)*dTotalAll)}</div>
            <div className="reimb-big">
              {reimbursement>=0
                ?`금 ${fmt(Math.round(Math.abs(reimbursement)))}`
                :`금 ${fmt(Math.round(Math.abs(reimbursement)))}  ※ 신청인 → 피신청인 지급`}
            </div>
          </div>
        </>
      )}
      {calcMode==='p' && (
        <>
          <div style={{margin:'14px 0',padding:'12px',background:'#f5f7fa',border:'1px solid #ccd3db',borderRadius:5,fontSize:13}}>
            <strong>소송비용 부담 비율</strong>
            <div style={{marginTop:6}}>
              신청인 부담: {rDen-rNum}/{rDen} ({(((rDen-rNum)/rDen)*100).toFixed(1)}%)&nbsp;&nbsp;&nbsp;
              피신청인 부담: {rNum}/{rDen} ({((rNum/rDen)*100).toFixed(1)}%)
            </div>
          </div>
          <div className="reimb">
            <div className="reimb-title">신청인 소송비용 중 피신청인이 부담할 금액⑧</div>
            <div className="reimb-formula">= 피신청인 부담비율 × 신청인 소송비용</div>
            <div className="reimb-formula">= {rNum}/{rDen} × {fmt(pTotalAll)}</div>
            <div className="reimb-big">{`금 ${fmt(Math.round((rNum/rDen)*pTotalAll))}`}</div>
          </div>
        </>
      )}
      {calcMode==='d' && (
        <>
          <div style={{margin:'14px 0',padding:'12px',background:'#f5f7fa',border:'1px solid #ccd3db',borderRadius:5,fontSize:13}}>
            <strong>소송비용 부담 비율</strong>
            <div style={{marginTop:6}}>
              신청인 부담: {rDen-rNum}/{rDen} ({(((rDen-rNum)/rDen)*100).toFixed(1)}%)&nbsp;&nbsp;&nbsp;
              피신청인 부담: {rNum}/{rDen} ({((rNum/rDen)*100).toFixed(1)}%)
            </div>
          </div>
          <div className="reimb">
            <div className="reimb-title">피신청인 소송비용 중 신청인이 부담할 금액⑧</div>
            <div className="reimb-formula">= 신청인 부담비율 × 피신청인 소송비용</div>
            <div className="reimb-formula">= {rDen-rNum}/{rDen} × {fmt(dTotalAll)}</div>
            <div className="reimb-big">{`금 ${fmt(Math.round(((rDen-rNum)/rDen)*dTotalAll))}`}</div>
          </div>
        </>
      )}
      <WinFootnotes anyAttyEnabled={anyAttyEnabled} isPartial={calcMode==='both'} attyData={null}/>
    </div>
  );
};

const App = () => {

  const todayWriteDate = (() => { const d=new Date(); return `${d.getFullYear()}. ${d.getMonth()+1}.`; })();

    docTitle:'소송비용액확정신청서', caseHeader:'소송비용액확정신청', caseTitle:'',
    applicant:'', respondent:'', verdictDate:'', agentTitle:'', agentName:'', submitCourt:'',
    writeDate: todayWriteDate,
    applicantAddresses: [],
    respondentAddresses: [],
    showDocTitle:true, showCaseHeader:false, showCaseTitle:true,
    showApplicant:true, showRespondent:true,
    showClaim:true, showReason:true, showEvidence:true, showAttach:true,
  });
  const updPetition = (k,v) => setPetition(p=>({...p,[k]:v}));

  /* 승소 */
  const [winInsts,     setWinInsts]     = useState([defaultWinInst('1심')]);
  const [winActiveIdx, setWinActiveIdx] = useState(0);
  const [confStamp, setConfStamp] = useState('');
  const [confPost,  setConfPost]  = useState('');

  /* 일부승소 */
  const [partialInsts,     setPartialInsts]     = useState([defaultPartialInst('1심')]);
  const [partialActiveIdx, setPartialActiveIdx] = useState(0);
  const [pRatioNum, setPRatioNum] = useState('7');
  const [pRatioDen, setPRatioDen] = useState('10');
  const [partialParty, setPartialParty] = useState('p'); // 'p' | 'd'
  const [partialCalcMode, setPartialCalcMode] = useState('both'); // 'p' | 'd' | 'both'
  const [partialBonStamp, setPartialBonStamp] = useState('');
  const [partialBonPost,  setPartialBonPost]  = useState('');

  /* 포기 */
  const [abandonInsts,     setAbandonInsts]     = useState([defaultAbandonInst('1심')]);
  const [abandonActiveIdx, setAbandonActiveIdx] = useState(0);

  const isGlobalWin    = globalMode === '승소';
  const isPartialMode  = globalMode === '일부승소(포기)';
  const isGiveup       = globalMode === '포기';

  /* ── 승소 관리 ── */
  const winInst = winInsts[winActiveIdx];
  const updWinInst = upd => setWinInsts(prev=>{const nx=[...prev];nx[winActiveIdx]={...nx[winActiveIdx],...upd};return nx;});
  const updWinSec  = u => updWinInst({sec:{...winInst.sec,...u}});
  const addWinTravel = (dep,dest,fare) => updWinInst({travels:[...winInst.travels,
    {dep:dep||'',dest:dest||'',fare:fare?String(fare):'',trips:'1',enabled:true,amt:'',note:''}]});
  const removeWinTravel = i => updWinInst({travels:winInst.travels.filter((_,j)=>j!==i)});
  const updWinTravelField = (ti,field,val) => setWinInsts(prev=>{
    const nx=[...prev]; const ts=[...nx[winActiveIdx].travels];
    ts[ti]={...ts[ti],[field]:val}; nx[winActiveIdx]={...nx[winActiveIdx],travels:ts}; return nx;
  });
  const addWinInstance = () => {
    if(winInsts.length>=INSTANCE_LABELS.length) return;
    setWinInsts(prev=>[...prev,defaultWinInst(INSTANCE_LABELS[prev.length])]);
    setWinActiveIdx(winInsts.length);
  };
  const deleteWinInstance = () => {
    if(winActiveIdx===0||winInsts.length<=1) return;
    if(!confirm('현재 심급 데이터를 삭제하시겠습니까?')) return;
    const ni=winInsts.filter((_,i)=>i!==winActiveIdx);
    setWinInsts(ni); setWinActiveIdx(Math.min(winActiveIdx,ni.length-1));
  };
  const resetWinInst = () => {
    if(!confirm('현재 심급의 모든 입력값을 초기화하시겠습니까?')) return;
    setWinInsts(prev=>{const nx=[...prev];nx[winActiveIdx]=defaultWinInst(winInst.label);return nx;});
    setConfStamp(''); setConfPost('');
  };
  const allWinComputed = winInsts.map(computeWinInst);
  const winGrand = allWinComputed.reduce((s,c)=>s+c.subtotal,0)+N(confStamp)+N(confPost);
  const n_win = winInsts.length;
  const confLabel_win = String.fromCharCode(65+n_win);
  const bonAnLabel_win = SUB_LABELS.slice(0,n_win).join('+');

  /* ── 일부승소 관리 ── */
  const partialInst = partialInsts[partialActiveIdx];
  const updPartialInst = upd => setPartialInsts(prev=>{const nx=[...prev];nx[partialActiveIdx]={...nx[partialActiveIdx],...upd};return nx;});
  const updParty = (party, upd) => updPartialInst({[party]:{...partialInst[party],...upd}});
  const updPartySec = (party, u) => updParty(party, {sec:{...partialInst[party].sec,...u}});
  const addPartyTravel = (party,dep,dest,fare) => updParty(party,{travels:[...partialInst[party].travels,
    {dep:dep||'',dest:dest||'',fare:fare?String(fare):'',trips:'1',enabled:true,amt:'',note:''}]});
  const removePartyTravel = (party,i) => updParty(party,{travels:partialInst[party].travels.filter((_,j)=>j!==i)});
  const updPartyTravelField = (party,ti,field,val) => setPartialInsts(prev=>{
    const nx=[...prev]; const ts=[...nx[partialActiveIdx][party].travels];
    ts[ti]={...ts[ti],[field]:val}; nx[partialActiveIdx]={...nx[partialActiveIdx],[party]:{...nx[partialActiveIdx][party],travels:ts}}; return nx;
  });
  const addPartialInstance = () => {
    if(partialInsts.length>=INSTANCE_LABELS.length) return;
    setPartialInsts(prev=>[...prev,defaultPartialInst(INSTANCE_LABELS[prev.length])]);
    setPartialActiveIdx(partialInsts.length);
  };
  const deletePartialInstance = () => {
    if(partialActiveIdx===0||partialInsts.length<=1) return;
    if(!confirm('현재 심급 데이터를 삭제하시겠습니까?')) return;
    const ni=partialInsts.filter((_,i)=>i!==partialActiveIdx);
    setPartialInsts(ni); setPartialActiveIdx(Math.min(partialActiveIdx,ni.length-1));
  };
  const resetPartialInst = () => {
    if(!confirm('현재 심급의 모든 입력값을 초기화하시겠습니까?')) return;
    setPartialInsts(prev=>{const nx=[...prev];nx[partialActiveIdx]=defaultPartialInst(partialInst.label);return nx;});
  };
  const pTotalAll = partialInsts.reduce((s,pi)=>{
    const items=getInstItems(toWinView(pi,'p')); return s+items.reduce((ss,i)=>ss+i.amount,0);
  },0);
  const dTotalAll = partialInsts.reduce((s,pi)=>{
    const items=getInstItems(toWinView(pi,'d')); return s+items.reduce((ss,i)=>ss+i.amount,0);
  },0);
  const rNum_p = parseInt(pRatioNum)||0; const rDen_p = parseInt(pRatioDen)||10;
  const reimbursement_p = (rNum_p/rDen_p)*pTotalAll - ((rDen_p-rNum_p)/rDen_p)*dTotalAll;
  const partialGrand = Math.max(0, Math.round(Math.abs(reimbursement_p)));

  /* ── 포기 관리 ── */
  const abandonInst = abandonInsts[abandonActiveIdx];
  const updAbandonInst = upd => setAbandonInsts(prev=>{const nx=[...prev];nx[abandonActiveIdx]={...nx[abandonActiveIdx],...upd};return nx;});
  const addAbandonInstance = () => {
    if(abandonInsts.length>=INSTANCE_LABELS.length) return;
    setAbandonInsts(prev=>[...prev,defaultAbandonInst(INSTANCE_LABELS[prev.length])]);
    setAbandonActiveIdx(abandonInsts.length);
  };
  const deleteAbandonInstance = () => {
    if(abandonActiveIdx===0||abandonInsts.length<=1) return;
    if(!confirm('현재 심급 데이터를 삭제하시겠습니까?')) return;
    const ni=abandonInsts.filter((_,i)=>i!==abandonActiveIdx);
    setAbandonInsts(ni); setAbandonActiveIdx(Math.min(abandonActiveIdx,ni.length-1));
  };
  const resetAbandonInst = () => {
    if(!confirm('현재 심급의 모든 입력값을 초기화하시겠습니까?')) return;
    setAbandonInsts(prev=>{const nx=[...prev];nx[abandonActiveIdx]=defaultAbandonInst(abandonInst.label);return nx;});
  };

  /* ── 인쇄 ── */
  const printSection = section => {
    const origTitle = document.title;
    if(section === 'calc') document.title = '소송비용계산서';
    else if(section === 'petition') document.title = '소송비용액확정신청서';
    else if(section === 'abandon') document.title = '소송비용계산서(포기)';
    document.body.setAttribute('data-print', section);
    const cleanup = () => {
      document.body.removeAttribute('data-print');
      document.title = origTitle;
      window.removeEventListener('afterprint', cleanup);
    };
    window.addEventListener('afterprint', cleanup);
    window.print();
  };

  const modeCls = {승소:'m-win', '일부승소(포기)':'m-partial', 포기:'m-giveup'};

  /* 현재 활성 인스턴스 배열 & 탭 관리 */
  const curTabInsts   = isGlobalWin ? winInsts : isPartialMode ? partialInsts : abandonInsts;
  const curActiveIdx  = isGlobalWin ? winActiveIdx : isPartialMode ? partialActiveIdx : abandonActiveIdx;
  const addInst       = isGlobalWin ? addWinInstance : isPartialMode ? addPartialInstance : addAbandonInstance;
  const deleteInst    = isGlobalWin ? deleteWinInstance : isPartialMode ? deletePartialInstance : deleteAbandonInstance;
  const setActiveIdx  = isGlobalWin ? setWinActiveIdx : isPartialMode ? setPartialActiveIdx : setAbandonActiveIdx;

  /* 현재 party 데이터 */
  const pp = partialParty; // 'p' | 'd'
  const partyData = isPartialMode ? partialInst[pp] : null;

  /* 승소 grand total 문자열 */
  const grandLabelWin = `${bonAnLabel_win}+${confLabel_win}`;

  return (
    <div>
      <div className="app-header">
        <h1>⚖ 소송비용액확정신청서 및 소송비용계산서 자동화</h1>
        <p>심급별 · 소송 결과별 맞춤형 소송비용계산서 자동 생성</p>
      </div>

      {/* 수정 10: 승소/일부승소/포기 */}
      <div className="mode-bar">
        <label>소송 결과 선택:</label>
        {['승소','일부승소(포기)','포기'].map(m=>(
          <button key={m} className={`mbtn${globalMode===m?' '+modeCls[m]:''}`} onClick={()=>setGlobalMode(m)}>
            {m==='승소'?'✅ 승소':m==='일부승소(포기)'?'⚖ 일부승소(포기)':'🚫 포기'}
          </button>
        ))}
        <span className="mode-hint">{isGlobalWin?'본안비용 양식':isGiveup?'포기 양식':'상환금액 계산 양식'}</span>
      </div>

      {/* 수정 9: 심급 탭 */}
      <div className="inst-tabs">
        <label>심급 선택:</label>
        {curTabInsts.map((ins,i)=>(
          <button key={i} className={`itab${curActiveIdx===i?' active':''}`} onClick={()=>setActiveIdx(i)}>
            {ins.label}
          </button>
        ))}
        {curTabInsts.length < INSTANCE_LABELS.length && (
          <button className="itab-add" onClick={addInst}>+ {INSTANCE_LABELS[curTabInsts.length]} 추가</button>
        )}
        {curTabInsts.length > 1 && curActiveIdx !== 0 && (
          <button className="itab-del" onClick={deleteInst}>× 현재 심급 삭제</button>
        )}
      </div>

      <div className="layout">
        {/* ══ 입력 패널 ══ */}
        <div className="inp no-print">

          {/* ── 승소 입력 ── */}
          {isGlobalWin && (
            <>
              <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
                <button className="btn btn-r" style={{fontSize:12}} onClick={resetWinInst}>🗑 전체 초기화</button>
              </div>
              {/* 수정 1: 라벨 변경 */}
              <div className="sec">
                <div className="sec-title">📁 사건 정보 — {winInst.label}</div>
                <div className="frow">
                  <div className="fg"><label className="fl">사건번호</label>
                    <input className="fi" value={winInst.num} onChange={e=>updWinInst({num:e.target.value})} placeholder="2024가단12345"/></div>
                  <div className="fg"><label className="fl">법원</label>
                    <input className="fi" value={winInst.court} onChange={e=>updWinInst({court:e.target.value})} placeholder="수원지방법원"/></div>
                </div>
              </div>
              <ItemSection label="📅 변론기일 참석 일당" enabled={winInst.attendEnabled} onToggle={()=>updWinInst({attendEnabled:!winInst.attendEnabled})}>
                <div className="fg">
                  <label className="fl">횟수</label>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <input className="fi" style={{width:80}} type="number" min="0" value={winInst.attendCnt} onChange={e=>updWinInst({attendCnt:e.target.value})} placeholder="0"/>
                    <span style={{fontSize:12,color:'#666'}}>회 × 50,000원 = <strong>{(N(winInst.attendCnt)*ATTENDANCE).toLocaleString()}원</strong></span>

                </div>
                <div className="frow" style={{alignItems:'flex-end',gap:4}}>
                  <div className="fg"><label className="fl">금액</label>
                    <input className="fi" type="number" value={winInst.attendAmt!==''?winInst.attendAmt:autoAttendAmt(winInst)||''} onChange={e=>updWinInst({attendAmt:e.target.value})} placeholder={String(autoAttendAmt(winInst))}/></div>
                  <div className="fg"><label className="fl">비고</label>
                    <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={winInst.attendNote!==''?winInst.attendNote:`1회당¹⁾\n50,000원`} onChange={e=>updWinInst({attendNote:e.target.value})}/></div>
                  <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updWinInst({attendAmt:'',attendNote:''})}>↺</button>
                </div>
              </ItemSection>
              <ItemSection label="🍱 식대" enabled={winInst.mealEnabled} onToggle={()=>updWinInst({mealEnabled:!winInst.mealEnabled})}>
                <div className="fg">
                  <label className="fl">횟수</label>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <input className="fi" style={{width:80}} type="number" min="0" value={winInst.mealCnt} onChange={e=>updWinInst({mealCnt:e.target.value})} placeholder="0"/>
                    <span style={{fontSize:12,color:'#666'}}>회 × 25,000원 = <strong>{(N(winInst.mealCnt)*MEAL).toLocaleString()}원</strong></span>
                  </div>
                </div>
                <div className="frow" style={{alignItems:'flex-end',gap:4}}>
                  <div className="fg"><label className="fl">금액</label>
                    <input className="fi" type="number" value={winInst.mealAmt!==''?winInst.mealAmt:autoMealAmt(winInst)||''} onChange={e=>updWinInst({mealAmt:e.target.value})} placeholder={String(autoMealAmt(winInst))}/></div>
                  <div className="fg"><label className="fl">비고</label>
                    <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={winInst.mealNote!==''?winInst.mealNote:`1일²⁾\n25,000원³⁾`} onChange={e=>updWinInst({mealNote:e.target.value})}/></div>
                  <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updWinInst({mealAmt:'',mealNote:''})}>↺</button>
                </div>
              </ItemSection>
              <TravelSection travels={winInst.travels} onAdd={addWinTravel} onRemove={removeWinTravel} onUpdateField={updWinTravelField}
                quickAdd={(dep,dest,fare)=>addWinTravel(dep,dest,fare)}/>
              {/* 수정 7: 변호사보수 */}
              <ItemSection label="👔 변호사 보수" enabled={winInst.attyEnabled} onToggle={()=>updWinInst({attyEnabled:!winInst.attyEnabled})}>
                <div className="fg"><label className="fl">소가 (원)</label>
                  <input className="fi" type="number" value={winInst.attySoga} onChange={e=>updWinInst({attySoga:e.target.value})} placeholder="0"/></div>
                {N(winInst.attySoga)>0&&<div className="cbadge"><div className="cbadge-row"><span>규칙상 한도</span><span>{fmt(feeCalc(N(winInst.attySoga)))}</span></div></div>}
                <div className="fg" style={{marginTop:6}}><label className="fl">실지급 변호사보수 (원)</label>
                  <input className="fi" type="number" value={winInst.attyActual} onChange={e=>updWinInst({attyActual:e.target.value})} placeholder="0"/></div>
                {N(winInst.attySoga)>0&&<div className="cbadge"><div className="cbadge-total"><span>적용 보수액</span><span>{fmt(autoAttyApplied(winInst))}</span></div></div>}
                <div className="frow" style={{alignItems:'flex-end',gap:4,marginTop:6}}>
                  <div className="fg"><label className="fl">금액</label>
                    <input className="fi" type="number" value={winInst.attyAmt!==''?winInst.attyAmt:autoAttyApplied(winInst)||''} onChange={e=>updWinInst({attyAmt:e.target.value})}/></div>
                  <div className="fg"><label className="fl">비고</label>
                    <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={winInst.attyNote!==''?winInst.attyNote:`변호사\n보수⁷⁾`} onChange={e=>updWinInst({attyNote:e.target.value})}/></div>
                  <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updWinInst({attyAmt:'',attyNote:''})}>↺</button>
                </div>
              </ItemSection>
              <ItemSection label="📝 서기료" enabled={winInst.secEnabled} onToggle={()=>updWinInst({secEnabled:!winInst.secEnabled})}>
                <div className="frow">
                  <div className="fg"><label className="fl">총 장수</label>
                    <input className="fi" type="number" min="0" value={winInst.sec.total_pages} onChange={e=>updWinSec({total_pages:e.target.value})} placeholder="0"/></div>
                  <div className="fg"><label className="fl">서면 내역</label>
                    <input className="fi" value={winInst.sec_desc} onChange={e=>updWinInst({sec_desc:e.target.value})} placeholder="답변서 1회, 준비서면 2회"/></div>
                </div>
                <div className="frow" style={{alignItems:'flex-end',gap:4}}>
                  <div className="fg"><label className="fl">금액</label>
                    <input className="fi" type="number" value={winInst.secAmt!==''?winInst.secAmt:autoSecAmt(winInst)||''} onChange={e=>updWinInst({secAmt:e.target.value})}/></div>
                  <div className="fg"><label className="fl">비고</label>
                    <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={winInst.secNote!==''?winInst.secNote:`장당\n250원`} onChange={e=>updWinInst({secNote:e.target.value})}/></div>
                  <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updWinInst({secAmt:'',secNote:''})}>↺</button>
                </div>
              </ItemSection>
              <ItemSection label="📋 본안 소송비용 (인지액·송달료·환급액)" enabled={winInst.bonStampEnabled} onToggle={()=>updWinInst({bonStampEnabled:!winInst.bonStampEnabled})}>
                <div className="frow">
                  <div className="fg"><label className="fl">인지액 (원)</label>
                    <input className="fi" type="number" value={winInst.bonStamp} onChange={e=>updWinInst({bonStamp:e.target.value})} placeholder="0"/></div>
                  <div className="fg"><label className="fl">송달료 (원)</label>
                    <input className="fi" type="number" value={winInst.bonPost} onChange={e=>updWinInst({bonPost:e.target.value})} placeholder="0"/></div>
                </div>
                <div className="frow">
                  <div className="fg"><label className="fl">환급액 (원, 차감)</label>
                    <input className="fi" type="number" value={winInst.bonRefund} onChange={e=>updWinInst({bonRefund:e.target.value})} placeholder="0"/></div>
                  <div className="fg" style={{display:'flex',alignItems:'flex-end',paddingBottom:2}}>
                    <span style={{fontSize:12,color:'#1b3a5e',fontWeight:700}}>
                      소계: {fmt(N(winInst.bonStamp)+N(winInst.bonPost)-N(winInst.bonRefund))}
                    </span>
                  </div>
                </div>
              </ItemSection>
              <ItemSection label="📎 기타 비용" enabled={winInst.otherEnabled} onToggle={()=>updWinInst({otherEnabled:!winInst.otherEnabled})}>
                <div className="frow">
                  <div className="fg"><label className="fl">금액 (원)</label>
                    <input className="fi" type="number" value={winInst.other} onChange={e=>updWinInst({other:e.target.value})} placeholder="0"/></div>
                  <div className="fg"><label className="fl">비고</label>
                    <input className="fi" value={winInst.otherNote||''} onChange={e=>updWinInst({otherNote:e.target.value})}/></div>
                </div>
              </ItemSection>
              <ItemSection label="📋 소송비용확정 신청비용" enabled={winInst.confEnabled} onToggle={()=>updWinInst({confEnabled:!winInst.confEnabled})}>
                <div className="frow">
                  <div className="fg"><label className="fl">신청서 인지대 (원)</label><input className="fi" value={confStamp} onChange={e=>setConfStamp(e.target.value)} placeholder="0"/></div>
                  <div className="fg"><label className="fl">송달료 (원)</label><input className="fi" value={confPost} onChange={e=>setConfPost(e.target.value)} placeholder="0"/></div>
                </div>
              </ItemSection>
              <div className="total-box">
                <div style={{fontSize:12,color:'#555',marginBottom:4}}>총 소송비용 합계 ({grandLabelWin})</div>
                <div className="big">{fmt(winGrand)}</div>
              </div>
              <PetitionInput petition={petition} onUpdate={updPetition} firstInstCourt={winInsts[0]?.court}/>
            </>
          )}

          {/* ── 일부승소 입력 ── */}
          {isPartialMode && (
            <>
              {/* 계산 모드 선택 */}
              <div className="sec" style={{borderLeft:'4px solid #d35400'}}>
                <div className="sec-title">⚙ 계산 범위 선택</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {[
                    {val:'both', label:'신청인 + 피신청인'},
                    {val:'p',    label:'신청인만'},
                    {val:'d',    label:'피신청인만'},
                  ].map(({val,label})=>(
                    <label key={val} style={{display:'flex',alignItems:'center',gap:5,fontSize:13,cursor:'pointer',
                      padding:'6px 12px',borderRadius:6,border:`2px solid ${partialCalcMode===val?'#d35400':'#ccd3db'}`,
                      background:partialCalcMode===val?'#fff3ec':'#fff',fontWeight:partialCalcMode===val?700:400}}>
                      <input type="radio" name="calcMode" value={val}
                        checked={partialCalcMode===val} onChange={()=>setPartialCalcMode(val)} style={{display:'none'}}/>
                      {label}
                    </label>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                {(partialCalcMode==='both'||partialCalcMode==='p'||partialCalcMode==='d') && (
                  <div className="party-toggle">
                    {(partialCalcMode==='both'||partialCalcMode==='p') && (
                      <button className={`party-tab${pp==='p'?' active':''}`} onClick={()=>setPartialParty('p')}>신청인</button>
                    )}
                    {(partialCalcMode==='both'||partialCalcMode==='d') && (
                      <button className={`party-tab${pp==='d'?' active':''}`} onClick={()=>setPartialParty('d')}>피신청인</button>
                    )}
                  </div>
                )}
                <button className="btn btn-r" style={{fontSize:12}} onClick={resetPartialInst}>🗑 전체 초기화</button>
              </div>
              <div className="sec">
                <div className="sec-title">📁 사건 정보 — {partialInst.label}</div>
                <div className="frow">
                  <div className="fg"><label className="fl">사건번호</label>
                    <input className="fi" value={partialInst.num} onChange={e=>updPartialInst({num:e.target.value})} placeholder="2024가단12345"/></div>
                  <div className="fg"><label className="fl">법원</label>
                    <input className="fi" value={partialInst.court} onChange={e=>updPartialInst({court:e.target.value})} placeholder="수원지방법원"/></div>
                </div>
              </div>
              <div className="sec">
                <div className="sec-title">⚖ 소송비용 부담 비율 (전체 적용)</div>
                <div className="ratio-row">
                  <span>피신청인 부담:</span>
                  <input value={pRatioNum} onChange={e=>setPRatioNum(e.target.value)}/>
                  <span style={{fontWeight:700}}>/</span>
                  <input value={pRatioDen} onChange={e=>setPRatioDen(e.target.value)}/>
                  <span className="ratio-pct">({((rNum_p/rDen_p)*100).toFixed(1)}%)</span>
                </div>
              </div>
              {/* 선택된 party 항목 */}
              <div style={{background:'#f0f4f8',borderRadius:8,padding:8,marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13,color:'#1b3a5e',marginBottom:8}}>
                  {pp==='p'?'👤 신청인 소송비용':'👤 피신청인 소송비용'}
                </div>
                <ItemSection label="📅 변론기일 참석 일당" enabled={partyData.attendEnabled} onToggle={()=>updParty(pp,{attendEnabled:!partyData.attendEnabled})}>
                  <div className="fg"><label className="fl">횟수</label>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <input className="fi" style={{width:80}} type="number" min="0" value={partyData.attendCnt} onChange={e=>updParty(pp,{attendCnt:e.target.value})} placeholder="0"/>
                      <span style={{fontSize:12,color:'#666'}}>회 × 50,000원</span>
                    </div>
                  </div>
                  <div className="frow" style={{alignItems:'flex-end',gap:4}}>
                    <div className="fg"><label className="fl">금액</label>
                      <input className="fi" type="number" value={partyData.attendAmt!==''?partyData.attendAmt:N(partyData.attendCnt)*ATTENDANCE||''} onChange={e=>updParty(pp,{attendAmt:e.target.value})}/></div>
                    <div className="fg"><label className="fl">비고</label>
                      <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={partyData.attendNote!==''?partyData.attendNote:`1회당¹⁾\n50,000원`} onChange={e=>updParty(pp,{attendNote:e.target.value})}/></div>
                    <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updParty(pp,{attendAmt:'',attendNote:''})}>↺</button>
                  </div>
                </ItemSection>
                <ItemSection label="🍱 식대" enabled={partyData.mealEnabled} onToggle={()=>updParty(pp,{mealEnabled:!partyData.mealEnabled})}>
                  <div className="fg"><label className="fl">횟수</label>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <input className="fi" style={{width:80}} type="number" min="0" value={partyData.mealCnt} onChange={e=>updParty(pp,{mealCnt:e.target.value})} placeholder="0"/>
                      <span style={{fontSize:12,color:'#666'}}>회 × 25,000원</span>
                    </div>
                  </div>
                  <div className="frow" style={{alignItems:'flex-end',gap:4}}>
                    <div className="fg"><label className="fl">금액</label>
                      <input className="fi" type="number" value={partyData.mealAmt!==''?partyData.mealAmt:N(partyData.mealCnt)*MEAL||''} onChange={e=>updParty(pp,{mealAmt:e.target.value})}/></div>
                    <div className="fg"><label className="fl">비고</label>
                      <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={partyData.mealNote!==''?partyData.mealNote:`1일²⁾\n25,000원³⁾`} onChange={e=>updParty(pp,{mealNote:e.target.value})}/></div>
                    <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updParty(pp,{mealAmt:'',mealNote:''})}>↺</button>
                  </div>
                </ItemSection>
                <TravelSection travels={partyData.travels}
                  onAdd={(dep,dest,fare)=>addPartyTravel(pp,dep,dest,fare)}
                  onRemove={i=>removePartyTravel(pp,i)}
                  onUpdateField={(ti,field,val)=>updPartyTravelField(pp,ti,field,val)}
                  quickAdd={(dep,dest,fare)=>addPartyTravel(pp,dep,dest,fare)}/>
                <ItemSection label="👔 변호사 보수" enabled={partyData.attyEnabled} onToggle={()=>updParty(pp,{attyEnabled:!partyData.attyEnabled})}>
                  <div className="fg"><label className="fl">소가 (원)</label>
                    <input className="fi" type="number" value={partyData.attySoga} onChange={e=>updParty(pp,{attySoga:e.target.value})} placeholder="0"/></div>
                  {N(partyData.attySoga)>0&&<div className="cbadge"><div className="cbadge-row"><span>규칙상 한도</span><span>{fmt(feeCalc(N(partyData.attySoga)))}</span></div></div>}
                  <div className="fg" style={{marginTop:6}}><label className="fl">실지급 변호사보수</label>
                    <input className="fi" type="number" value={partyData.attyActual} onChange={e=>updParty(pp,{attyActual:e.target.value})} placeholder="0"/></div>
                  {N(partyData.attySoga)>0&&<div className="cbadge"><div className="cbadge-total"><span>적용 보수액</span><span>{fmt(autoAttyApplied(partyData))}</span></div></div>}
                  <div className="frow" style={{alignItems:'flex-end',gap:4,marginTop:6}}>
                    <div className="fg"><label className="fl">금액</label>
                      <input className="fi" type="number" value={partyData.attyAmt!==''?partyData.attyAmt:autoAttyApplied(partyData)||''} onChange={e=>updParty(pp,{attyAmt:e.target.value})}/></div>
                    <div className="fg"><label className="fl">비고</label>
                      <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={partyData.attyNote!==''?partyData.attyNote:`변호사\n보수⁷⁾`} onChange={e=>updParty(pp,{attyNote:e.target.value})}/></div>
                    <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updParty(pp,{attyAmt:'',attyNote:''})}>↺</button>
                  </div>
                </ItemSection>
                <ItemSection label="📝 서기료" enabled={partyData.secEnabled} onToggle={()=>updParty(pp,{secEnabled:!partyData.secEnabled})}>
                  <div className="frow">
                    <div className="fg"><label className="fl">총 장수</label>
                      <input className="fi" type="number" min="0" value={partyData.sec.total_pages} onChange={e=>updPartySec(pp,{total_pages:e.target.value})} placeholder="0"/></div>
                    <div className="fg"><label className="fl">서면 내역</label>
                      <input className="fi" value={partyData.sec_desc} onChange={e=>updParty(pp,{sec_desc:e.target.value})} placeholder="답변서 1회"/></div>
                  </div>
                  <div className="frow" style={{alignItems:'flex-end',gap:4}}>
                    <div className="fg"><label className="fl">금액</label>
                      <input className="fi" type="number" value={partyData.secAmt!==''?partyData.secAmt:autoSecAmt(partyData)||''} onChange={e=>updParty(pp,{secAmt:e.target.value})}/></div>
                    <div className="fg"><label className="fl">비고</label>
                      <textarea className="fi" rows="2" style={{resize:'none',fontSize:12}} value={partyData.secNote!==''?partyData.secNote:`장당\n250원`} onChange={e=>updParty(pp,{secNote:e.target.value})}/></div>
                    <button className="btn btn-s" style={{padding:'7px 10px',flexShrink:0,marginBottom:1}} onClick={()=>updParty(pp,{secAmt:'',secNote:''})}>↺</button>
                  </div>
                </ItemSection>
                <ItemSection label="📋 본안 소송비용 (인지액·송달료·환급액)" enabled={partyData.bonStampEnabled} onToggle={()=>updParty(pp,{bonStampEnabled:!partyData.bonStampEnabled})}>
                  <div className="frow">
                    <div className="fg"><label className="fl">인지액 (원)</label>
                      <input className="fi" type="number" value={partyData.bonStamp||''} onChange={e=>updParty(pp,{bonStamp:e.target.value})} placeholder="0"/></div>
                    <div className="fg"><label className="fl">송달료 (원)</label>
                      <input className="fi" type="number" value={partyData.bonPost||''} onChange={e=>updParty(pp,{bonPost:e.target.value})} placeholder="0"/></div>
                  </div>
                  <div className="frow">
                    <div className="fg"><label className="fl">환급액 (원, 차감)</label>
                      <input className="fi" type="number" value={partyData.bonRefund||''} onChange={e=>updParty(pp,{bonRefund:e.target.value})} placeholder="0"/></div>
                    <div className="fg" style={{display:'flex',alignItems:'flex-end',paddingBottom:2}}>
                      <span style={{fontSize:12,color:'#1b3a5e',fontWeight:700}}>
                        소계: {fmt(N(partyData.bonStamp)+N(partyData.bonPost)-N(partyData.bonRefund))}
                      </span>
                    </div>
                  </div>
                </ItemSection>
                <ItemSection label="📎 기타비용" enabled={partyData.otherEnabled} onToggle={()=>updParty(pp,{otherEnabled:!partyData.otherEnabled})}>
                  <div className="frow">
                    <div className="fg"><label className="fl">금액 (원)</label>
                      <input className="fi" type="number" value={partyData.otherAmt} onChange={e=>updParty(pp,{otherAmt:e.target.value})} placeholder="0"/></div>
                    <div className="fg"><label className="fl">비고</label>
                      <input className="fi" value={partyData.otherNote} onChange={e=>updParty(pp,{otherNote:e.target.value})}/></div>
                  </div>
                </ItemSection>
                <ItemSection label="📋 소송비용확정 신청비용" enabled={partyData.confEnabled} onToggle={()=>updParty(pp,{confEnabled:!partyData.confEnabled})}>
                  <div className="frow">
                    <div className="fg"><label className="fl">신청서 인지대 (원)</label>
                      <input className="fi" type="number" value={partyData.confStamp} onChange={e=>updParty(pp,{confStamp:e.target.value})} placeholder="0"/></div>
                    <div className="fg"><label className="fl">송달료 (원)</label>
                      <input className="fi" type="number" value={partyData.confPost} onChange={e=>updParty(pp,{confPost:e.target.value})} placeholder="0"/></div>
                  </div>
                  <div style={{textAlign:'right',fontWeight:700,color:'#1b3a5e',fontSize:12,marginTop:4}}>
                    소계: {fmt(N(partyData.confStamp)+N(partyData.confPost))}
                  </div>
                </ItemSection>
              </div>
              {/* 상환금액 미리보기 */}
              <div className="sec" style={{background:reimbursement_p>=0?'#fff8f0':'#fff0f0',borderLeft:`4px solid ${reimbursement_p>=0?'#d35400':'#c0392b'}`}}>
                <div className="sec-title" style={{color:reimbursement_p>=0?'#d35400':'#922b21'}}>💵 상환금액 (미리보기)</div>
                <div style={{fontSize:20,fontWeight:700,color:reimbursement_p>=0?'#d35400':'#922b21',textAlign:'right'}}>
                  {reimbursement_p>=0?'↑ 받을 금액: ':'↓ 지급 금액: '}{fmt(Math.abs(Math.round(reimbursement_p)))}
                </div>
              </div>
              <PetitionInput petition={petition} onUpdate={updPetition} firstInstCourt={partialInsts[0]?.court}/>
            </>
          )}

          {/* ── 포기 입력 ── */}
          {isGiveup && (
            <>
              <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
                <button className="btn btn-r" style={{fontSize:12}} onClick={resetAbandonInst}>🗑 전체 초기화</button>
              </div>
              <div className="sec">
                <div className="sec-title">📁 사건 정보 — {abandonInst.label}</div>
                <div className="frow">
                  <div className="fg"><label className="fl">법원</label><input className="fi" value={abandonInst.court} onChange={e=>updAbandonInst({court:e.target.value})} placeholder="수원지방법원"/></div>
                  <div className="fg"><label className="fl">사건번호</label><input className="fi" value={abandonInst.caseNum} onChange={e=>updAbandonInst({caseNum:e.target.value})} placeholder="2024구합12345"/></div>
                </div>
                <div className="fg"><label className="fl">사건명</label><input className="fi" value={abandonInst.caseTitle} onChange={e=>updAbandonInst({caseTitle:e.target.value})} placeholder="장기요양급여비용 환수결정 취소청구의 소"/></div>
              </div>
              <div className="sec">
                <div className="sec-title">⚖ 본안사건 소송비용</div>
                <div className="frow">
                  <div className="fg"><label className="fl">인지액 (원)</label><input className="fi" type="number" value={abandonInst.stampAmt} onChange={e=>updAbandonInst({stampAmt:e.target.value})} placeholder="0"/></div>
                  <div className="fg"><label className="fl">송달료 (원)</label><input className="fi" type="number" value={abandonInst.postageAmt} onChange={e=>updAbandonInst({postageAmt:e.target.value})} placeholder="0"/></div>
                </div>
                <div className="frow">
                  <div className="fg"><label className="fl">환급액 (원, 차감)</label><input className="fi" type="number" value={abandonInst.refundAmt} onChange={e=>updAbandonInst({refundAmt:e.target.value})} placeholder="0"/></div>
                  <div className="fg"><label className="fl">출장비 (원)</label><input className="fi" type="number" value={abandonInst.outingAmt} onChange={e=>updAbandonInst({outingAmt:e.target.value})} placeholder="0"/></div>
                </div>
                <div className="frow">
                  <div className="fg"><label className="fl">변론기일 참석 횟수</label>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input className="fi" style={{width:70}} type="number" min="0" value={abandonInst.attendCnt} onChange={e=>updAbandonInst({attendCnt:e.target.value})} placeholder="0"/>
                      <span style={{fontSize:11,color:'#666'}}>회 × 50,000 = {(N(abandonInst.attendCnt)*ATTENDANCE).toLocaleString()}원</span>
                    </div>
                  </div>
                  <div className="fg"><label className="fl">식대 횟수</label>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input className="fi" style={{width:70}} type="number" min="0" value={abandonInst.mealCnt} onChange={e=>updAbandonInst({mealCnt:e.target.value})} placeholder="0"/>
                      <span style={{fontSize:11,color:'#666'}}>회 × 25,000 = {(N(abandonInst.mealCnt)*MEAL).toLocaleString()}원</span>
                    </div>
                  </div>
                </div>
                <div className="fg"><label className="fl">서기료 총 장수</label>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <input className="fi" style={{width:70}} type="number" min="0" value={abandonInst.secPages} onChange={e=>updAbandonInst({secPages:e.target.value})} placeholder="0"/>
                    <span style={{fontSize:11,color:'#666'}}>장 × 250 = {(N(abandonInst.secPages)*SEC_RATE).toLocaleString()}원</span>
                  </div>
                </div>
                <div style={{textAlign:'right',fontWeight:700,color:'#1b3a5e'}}>본안 소계: {fmt(N(abandonInst.stampAmt)+N(abandonInst.postageAmt)-N(abandonInst.refundAmt)+N(abandonInst.outingAmt)+N(abandonInst.attendCnt)*ATTENDANCE+N(abandonInst.mealCnt)*MEAL+N(abandonInst.secPages)*SEC_RATE)}</div>
              </div>
              <div className="sec">
                <div className="sec-title">📋 신청사건 소송비용</div>
                <div className="frow">
                  <div className="fg"><label className="fl">신청서 인지대 (원)</label><input className="fi" type="number" value={abandonInst.appStampAmt} onChange={e=>updAbandonInst({appStampAmt:e.target.value})} placeholder="0"/></div>
                  <div className="fg"><label className="fl">송달료 (원)</label><input className="fi" type="number" value={abandonInst.appPostageAmt} onChange={e=>updAbandonInst({appPostageAmt:e.target.value})} placeholder="0"/></div>
                </div>
                <div style={{textAlign:'right',fontWeight:700,color:'#1b3a5e'}}>신청 소계: {fmt(N(abandonInst.appStampAmt)+N(abandonInst.appPostageAmt))}</div>
              </div>
            </>
          )}
        </div>

        {/* ══ 문서 패널 ══ */}
        <div className="doc-panel">
          {/* 수정 13: 섹션별 인쇄 툴바 */}
          <div className="doc-toolbar no-print">
            {isGlobalWin && !showPetition && (
              <>
                <button className="tbtn" onClick={()=>printSection('calc')}>🖨 계산서 인쇄</button>
                <button className="tbtn" onClick={()=>printSection('calc')}>💾 계산서 PDF 저장</button>
                <span className="tsep">|</span>
                <button className="tbtn tbtn-sec" onClick={()=>{setPetitionKey(k=>k+1);setShowPetition(true);}}>📄 신청서 보기</button>
              </>
            )}
            {isGlobalWin && showPetition && (
              <>
                <button className="tbtn" onClick={()=>printSection('petition')}>🖨 신청서 인쇄</button>
                <button className="tbtn" onClick={()=>printSection('petition')}>💾 신청서 PDF 저장</button>
                <span className="tsep">|</span>
                <button className="tbtn tbtn-sec" onClick={()=>setShowPetition(false)}>← 계산서로 돌아가기</button>
              </>
            )}
            {isPartialMode && !showPetition && (
              <>
                <button className="tbtn" onClick={()=>printSection('calc')}>🖨 계산서 인쇄</button>
                <button className="tbtn" onClick={()=>printSection('calc')}>💾 계산서 PDF 저장</button>
                <span className="tsep">|</span>
                <button className="tbtn tbtn-sec" onClick={()=>{setPetitionKey(k=>k+1);setShowPetition(true);}}>📄 신청서 보기</button>
              </>
            )}
            {isPartialMode && showPetition && (
              <>
                <button className="tbtn" onClick={()=>printSection('petition')}>🖨 신청서 인쇄</button>
                <button className="tbtn" onClick={()=>printSection('petition')}>💾 신청서 PDF 저장</button>
                <span className="tsep">|</span>
                <button className="tbtn tbtn-sec" onClick={()=>setShowPetition(false)}>← 계산서로 돌아가기</button>
              </>
            )}
            {isGiveup && (
              <>
                <button className="tbtn" onClick={()=>printSection('abandon')}>🖨 포기 문서 인쇄</button>
                <button className="tbtn" onClick={()=>printSection('abandon')}>💾 포기 문서 PDF 저장</button>
              </>
            )}
          </div>

          {/* 화면 표시 */}
          <div className="doc-screen-area">
            <div className="doc-wrap">
              {isGlobalWin && !showPetition && <WinDoc winInsts={winInsts} confStamp={confStamp} confPost={confPost}/>}
              {isGlobalWin && showPetition && (
                <PetitionDoc key={petitionKey} insts={winInsts} grandTotal={winGrand} petition={petition}/>
              )}
              {isPartialMode && !showPetition && <PartialDoc partialInsts={partialInsts} pRatioNum={pRatioNum} pRatioDen={pRatioDen} calcMode={partialCalcMode} bonStamp={partialBonStamp} bonPost={partialBonPost}/>}
              {isPartialMode && showPetition && (
                <PetitionDoc key={petitionKey} insts={partialInsts} grandTotal={partialGrand} petition={petition}/>
              )}
              {isGiveup && <AbandonDoc inst={abandonInst}/>}
            </div>
          </div>

          {/* 인쇄 전용 */}
          <div className="print-all-docs">
            {(isGlobalWin||isPartialMode) && (
              <>
                <div className="print-doc-wrap calc-print-area">
                  <div className="doc-wrap">
                    {isGlobalWin && <WinDoc winInsts={winInsts} confStamp={confStamp} confPost={confPost}/>}
                    {isPartialMode && <PartialDoc partialInsts={partialInsts} pRatioNum={pRatioNum} pRatioDen={pRatioDen} calcMode={partialCalcMode} bonStamp={partialBonStamp} bonPost={partialBonPost}/>}
                  </div>
                </div>
                <div className="print-doc-wrap petition-print-area">
                  <div className="doc-wrap">
                    <PetitionDoc key={petitionKey}
                      insts={isGlobalWin?winInsts:partialInsts}
                      grandTotal={isGlobalWin?winGrand:partialGrand}
                      petition={petition}/>
                  </div>
                </div>
              </>
            )}
            {isGiveup && abandonInsts.map((inst,i)=>(
              <div key={i} className="print-doc-wrap">
                <div className="doc-wrap"><AbandonDoc inst={inst}/></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
